<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务项目 - 三轮车维修创业</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-logo">
                <span class="logo-icon">🛠️</span>
                <span class="logo-text">三轮维修</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">首页</a>
                <a href="tools.html" class="nav-link active">服务项目</a>
                <a href="#" class="nav-link">创业指南</a>
                <a href="#" class="nav-link">关于我们</a>
            </div>
            <div class="nav-actions">
                <button class="btn btn-secondary">登录</button>
                <button class="btn btn-primary">预约服务</button>
            </div>
        </div>
    </nav>

    <section class="tools-page">
        <div class="container">
            <div class="page-header">
                <h1>服务项目</h1>
                <p>专业的三轮车维修服务，助力您的创业之路</p>
            </div>

            <div class="search-bar">
                <input type="text" id="toolSearchInput" placeholder="搜索服务项目...">
                <button class="search-btn">搜索</button>
            </div>

            <div class="filter-bar">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>分类:</label>
                        <select id="categoryFilter">
                            <option value="all">全部</option>
                            <option value="engine">发动机维修</option>
                            <option value="tire">轮胎服务</option>
                            <option value="battery">电池维护</option>
                            <option value="electric">电路检修</option>
                            <option value="brake">刹车系统</option>
                            <option value="transmission">传动系统</option>
                            <option value="maintenance">常规保养</option>
                            <option value="accessories">配件销售</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>排序:</label>
                        <select id="sortFilter">
                            <option value="popular">最热门</option>
                            <option value="newest">最新</option>
                            <option value="rating">评分最高</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="results-info">
                <span id="resultsCount">共 0 个服务</span>
            </div>

            <div class="tool-grid" id="toolsGrid">
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <div class="footer-logo">
                        <span class="logo-icon">🛠️</span>
                        <span class="logo-text">三轮维修</span>
                    </div>
                    <p>专业三轮车维修技术服务平台</p>
                </div>
                <div class="footer-section">
                    <h4>快速链接</h4>
                    <ul>
                        <li><a href="index.html">首页</a></li>
                        <li><a href="tools.html">服务项目</a></li>
                        <li><a href="#">创业指南</a></li>
                        <li><a href="#">关于我们</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>服务支持</h4>
                    <ul>
                        <li><a href="#">技术咨询</a></li>
                        <li><a href="#">配件采购</a></li>
                        <li><a href="#">开店指导</a></li>
                        <li><a href="#">联系我们</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>关注我们</h4>
                    <div class="social-links">
                        <a href="#" class="social-link">微信</a>
                        <a href="#" class="social-link">抖音</a>
                        <a href="#" class="social-link">快手</a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2024 三轮维修. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
